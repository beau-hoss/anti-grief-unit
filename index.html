<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anti-Grief Unit Duty System</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  background: #1e90ff;
  color: white;
}

button.on-duty {
  background: #28a745;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal.active {
  display: flex;
}

.modal-box {
  background: #1a1a1a;
  padding: 30px;
  border-radius: 8px;
  width: 300px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  font-size: 16px;
}

.modal-status {
  margin-top: 10px;
  display: none;
}

.modal-status.success {
  color: #28a745;
}

.modal-status.error {
  color: #ff4d4d;
}

.on-duty-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #28a745;
  padding: 10px;
  display: none;
  text-align: center;
}

.on-duty-bar.active {
  display: block;
}
</style>
</head>

<body>

<div class="container">
  <h1>ANTI-GRIEF UNIT</h1>
  <button id="dutyToggleBtn" onclick="openModal()">
    <span id="dutyBtnLabel">SIGN ON DUTY</span>
  </button>
</div>

<div id="dutyModal" class="modal">
  <div class="modal-box">

    <div id="modalSignIn">
      <h3>Enter Badge Number</h3>
      <input id="badgeInput" placeholder="Badge Number">
      <button id="signInBtn" onclick="signIn()">🛡️ SIGN ON DUTY</button>
      <div id="signInStatus" class="modal-status"></div>
    </div>

    <div id="modalSignOut" style="display:none;">
      <h3 id="signOutMsg"></h3>
      <button id="signOutBtn" onclick="signOut()">🔴 SIGN OFF DUTY</button>
      <div id="signOutStatus" class="modal-status"></div>
    </div>

  </div>
</div>

<div id="onDutyBar" class="on-duty-bar">
  ON DUTY — Badge <span id="activeBadgeDisplay"></span>
</div>

<script>
let onDuty = false;
let currentBadge = null;

function showStatus(id, type, msg) {
  const el = document.getElementById(id);
  if (!msg) {
    el.style.display = "none";
    return;
  }
  el.textContent = msg;
  el.className = "modal-status " + type;
  el.style.display = "block";
}

async function sendWebhook(message) {
  try {
    const response = await fetch("/api/duty", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await response.json();

    if (!response.ok) {
      return { success: false, error: data.error };
    }

    return { success: true };

  } catch (error) {
    return { success: false, error: error.message };
  }
}

async function signIn() {
  const badge = document.getElementById("badgeInput").value.trim();

  if (!badge) {
    showStatus("signInStatus", "error", "Please enter badge number.");
    return;
  }

  const result = await sendWebhook(`🛡️ BADGE #${badge} is now ON DUTY`);

  if (result.success) {
    onDuty = true;
    currentBadge = badge;

    document.getElementById("dutyToggleBtn").classList.add("on-duty");
    document.getElementById("dutyBtnLabel").textContent = "ON DUTY";
    document.getElementById("activeBadgeDisplay").textContent = badge;
    document.getElementById("onDutyBar").classList.add("active");

    showStatus("signInStatus", "success", `Badge #${badge} is ON DUTY.`);
  } else {
    showStatus("signInStatus", "error", result.error || "Failed to send webhook.");
  }
}

async function signOut() {
  if (!currentBadge) return;

  const result = await sendWebhook(`🔴 BADGE #${currentBadge} signed OFF DUTY`);

  if (result.success) {
    onDuty = false;
    currentBadge = null;

    document.getElementById("dutyToggleBtn").classList.remove("on-duty");
    document.getElementById("dutyBtnLabel").textContent = "SIGN ON DUTY";
    document.getElementById("onDutyBar").classList.remove("active");

    showStatus("signOutStatus", "success", "Signed off duty.");
  } else {
    showStatus("signOutStatus", "error", result.error || "Failed to send webhook.");
  }
}

function openModal() {
  document.getElementById("dutyModal").classList.add("active");

  if (onDuty) {
    document.getElementById("modalSignIn").style.display = "none";
    document.getElementById("modalSignOut").style.display = "block";
    document.getElementById("signOutMsg").textContent =
      `Badge #${currentBadge} — Sign off duty?`;
  } else {
    document.getElementById("modalSignIn").style.display = "block";
    document.getElementById("modalSignOut").style.display = "none";
  }
}

document.getElementById("dutyModal").addEventListener("click", e => {
  if (e.target.id === "dutyModal") {
    document.getElementById("dutyModal").classList.remove("active");
  }
});
</script>

</body>
</html>
